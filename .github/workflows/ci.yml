name: CI

# Build + test on every push and PR. Images are pushed to GHCR only on
# master pushes (never on PRs — PRs build to validate, but don't publish).
on:
  push:
    branches: [master]
  pull_request:

env:
  REGISTRY: ghcr.io
  # All images live under celine/* in the owner namespace.

jobs:
  # ---- Backend: build + test the Go module ----
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: basis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: basis/go.sum
      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...

  # ---- Frontend: typecheck + production build ----
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eidos
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build

  # ---- Proto: lint + verify generated code is in sync ----
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Lint
        working-directory: proto
        run: buf lint
      - name: Verify generated code is committed
        working-directory: proto
        run: |
          buf generate
          if ! git diff --quiet; then
            echo "::error::Generated code is out of date. Run 'cd proto && buf generate' and commit the result."
            git diff --stat
            exit 1
          fi

  # ---- Build + push images. Gated on the test jobs; pushes only on master. ----
  images:
    needs: [test-backend, test-frontend, proto]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # On PRs we still build (to catch Dockerfile breakage) but never push.
    env:
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: celine/server
            context: .
            dockerfile: basis/Dockerfile
            target: server
          - image: celine/worker
            context: .
            dockerfile: basis/Dockerfile
            target: worker
          - image: celine/eidos
            context: eidos
            dockerfile: eidos/Dockerfile
            target: eidos
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR image paths must be lowercase; the owner (YumikoKawaii) isn't.
      - name: Lowercase owner
        id: owner
        run: echo "name=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/${{ matrix.image }}
          tags: |
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          # Deploy target is x86_64 — pin the build arch so it can't drift.
          platforms: linux/amd64
          push: ${{ env.PUSH == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
