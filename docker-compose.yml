# Deployment compose — app images only (server · worker · eidos).
# Postgres, Redis and Ollama come from the shared `infra` stack; this compose
# joins the external `infra` network and reaches them by service name.
#
# Deploy (on the host, ~/celine, where .env already lives):
#   docker compose pull && docker compose up -d
#
# Images are pinned by short commit SHA via IMAGE_TAG in .env, e.g.
#   IMAGE_TAG=sha-3cb15a9
services:
  server:
    image: ghcr.io/yumikokawaii/celine/server:${IMAGE_TAG}
    env_file: .env
    environment:
      CELINE_ADDR: ":8080"
      CELINE_DB_DSN: "host=postgres user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} port=5432 sslmode=disable search_path=celine"
      CELINE_REDIS_ADDR: "redis:6379"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    restart: unless-stopped

  worker:
    image: ghcr.io/yumikokawaii/celine/worker:${IMAGE_TAG}
    env_file: .env
    environment:
      CELINE_DB_DSN: "host=postgres user=${DB_USER} password=${DB_PASSWORD} dbname=${DB_NAME} port=5432 sslmode=disable search_path=celine"
      CELINE_REDIS_ADDR: "redis:6379"
      OLLAMA_URL: "http://ollama:11434"
    restart: unless-stopped

  eidos:
    image: ghcr.io/yumikokawaii/celine/eidos:${IMAGE_TAG}
    ports:
      - "${EIDOS_PORT:-5173}:80"
    depends_on:
      - server
    restart: unless-stopped

# The infra stack (postgres · redis · ollama) owns this network; we attach to it.
networks:
  default:
    name: infra
    external: true
