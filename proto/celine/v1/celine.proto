syntax = "proto3";

package celine.v1;

option go_package = "github.com/YumikoKawaii/celine/basis/gen/celine/v1;celinev1";

service Celine {
  // Persistent server-streaming connection opened on login.
  // Server pushes all agent events (typing, bubbles, tool activity) through here.
  rpc Parousia  (ParousiaRequest)  returns (stream ParousiaEvent);

  // Unary — client sends a message. Response is immediate (just an ack);
  // the actual reply arrives through the open Parousia stream.
  rpc Pempo     (PempoRequest)     returns (PempoResponse);

  rpc Anamnesis (AnamnesisRequest) returns (AnamnesisResponse);
  rpc Katalogos (KatalogosRequest) returns (KatalogosResponse);
}

message ParousiaRequest {}

message ParousiaEvent {
  oneof event {
    Typing     typing      = 1;
    Message    message     = 2;
    ToolCall   tool_call   = 3;
    ToolResult tool_result = 4;
    Done       done        = 5;
    string     error       = 6;
  }
}

message PempoRequest {
  string conversation_id = 1;
  string text            = 2;
}

message PempoResponse {}

message Typing {
  int32 ms_hint = 1;
}

message Message {
  int32  seq  = 1;
  string text = 2;
}

message ToolCall {
  string id         = 1;
  string name       = 2;
  string input_json = 3;
}

message ToolResult {
  string id       = 1;
  string output   = 2;
  bool   is_error = 3;
}

message Done {
  string conversation_id = 1;
}

message AnamnesisRequest {
  string conversation_id = 1;
}

message AnamnesisResponse {
  repeated ChatMessage messages = 1;
}

message ChatMessage {
  string id              = 1;
  string role            = 2;
  string text            = 3;
  int64  created_at_unix = 4;
}

message KatalogosRequest {}

message KatalogosResponse {
  repeated Conversation conversations = 1;
}

message Conversation {
  string id              = 1;
  int64  created_at_unix = 2;
}
