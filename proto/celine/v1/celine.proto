syntax = "proto3";

package celine.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/YumikoKawaii/celine/basis/gen/celine/v1;celinev1";

service Celine {
  // Persistent server-streaming connection opened on login.
  // Server pushes all agent events (typing, bubbles, tool activity) through here.
  rpc Parousia  (ParousiaRequest)  returns (stream ParousiaEvent);

  // Unary — client sends a message. Response is immediate (just an ack);
  // the actual reply arrives through the open Parousia stream.
  rpc Pempo     (PempoRequest)     returns (PempoResponse);

  // Unary — client signals the user has gone quiet (stopped typing).
  // Flushes the pending inbox to the agent immediately instead of
  // waiting out the server-side debounce fallback.
  rpc Sigao     (SigaoRequest)     returns (SigaoResponse);

  rpc Anamnesis (AnamnesisRequest) returns (AnamnesisResponse);
}

message ParousiaRequest {}

message ParousiaEvent {
  oneof event {
    // Sent once when the agent starts working on the queued inbox —
    // the client shows the typing indicator on this signal, not optimistically.
    Typing     typing      = 1;
    Message    message     = 2;
    ToolCall   tool_call   = 3;
    ToolResult tool_result = 4;
    Done       done        = 5;
    string     error       = 6;
  }
}

message PempoRequest {
  string text = 1;
}

message PempoResponse {}

message Typing {}

message SigaoRequest {}

message SigaoResponse {}

message Message {
  int32  seq  = 1;
  string text = 2;
}

message ToolCall {
  string id         = 1;
  string name       = 2;
  string input_json = 3;
}

message ToolResult {
  string id       = 1;
  string output   = 2;
  bool   is_error = 3;
}

message Done {
  int64 conversation_id = 1;
}

message AnamnesisRequest {}

message AnamnesisResponse {
  repeated ChatMessage messages = 1;
}

message ChatMessage {
  int64                     id          = 1;
  int64                     prosopon_id = 2;
  string                    text        = 3;
  google.protobuf.Timestamp created_at  = 4;
}

